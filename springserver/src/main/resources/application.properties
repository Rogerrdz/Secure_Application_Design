spring.application.name=springserver

# Puerto del backend
server.port=8443

# TLS opcional por variables de entorno
server.ssl.enabled=${SSL_ENABLED:false}
server.ssl.key-store=${SSL_KEY_STORE:}
server.ssl.key-store-password=${SSL_KEY_STORE_PASSWORD:}
server.ssl.key-store-type=PKCS12

# Base de Datos MySQL (Produccion/AWS por defecto)
# Puedes sobreescribir con variables de entorno en EC2.
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/secureapp_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
spring.datasource.driver-class-name=${DB_DRIVER:com.mysql.cj.jdbc.Driver}
spring.datasource.username=${DB_USERNAME:secureapp}
spring.datasource.password=${DB_PASSWORD:secureapp123}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# Evita reinicios automáticos de DevTools que pueden dejar bloqueada la BD en algunos entornos.
spring.devtools.restart.enabled=false

# Consola H2 para pruebas locales (solo si activas H2 manualmente)
spring.h2.console.enabled=${H2_CONSOLE_ENABLED:false}
spring.h2.console.path=/h2-console

# Configuración JPA/Hibernate
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.use_sql_comments=true

# Alternativa: H2 en memoria (solo desarrollo local)
# DB_URL=jdbc:h2:mem:secureappdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
