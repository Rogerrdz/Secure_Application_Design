spring.application.name=springserver

# Puerto del backend
server.port=8443

# TLS opcional por variables de entorno
server.ssl.enabled=${SSL_ENABLED:false}
server.ssl.key-store=${SSL_KEY_STORE:}
server.ssl.key-store-password=${SSL_KEY_STORE_PASSWORD:}
server.ssl.key-store-type=PKCS12

# Base de Datos H2 (Desarrollo - Por defecto)
# En memoria para evitar bloqueos de archivo cuando hay múltiples procesos Java en desarrollo.
spring.datasource.url=jdbc:h2:mem:secureappdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# Evita reinicios automáticos de DevTools que pueden dejar bloqueada la BD en algunos entornos.
spring.devtools.restart.enabled=false

# Consola H2 para pruebas locales
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Configuración JPA/Hibernate
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.use_sql_comments=true

